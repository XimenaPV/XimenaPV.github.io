<!DOCTYPE html>
<html lang="en">
<head>
	<title>Canvas</title>
<style>
	canvas{
		border: black 1px solid;
	}
</style>
</head>
<body>
	<h1>This is a canvas</h1>
	<canvas id="canvas" width="800" height= "800">
	</canvas>
	<script>
	
	//MAGIC
	const canvas = document.getElementById("canvas");
	const ctx = canvas.getContext ("2d");	

	//draw a green rectangle
	ctx.fillStyle = "green";
	ctx.fillRect(100,100,200,300);

	//draw a red rectangle
	ctx.fillStyle = "red";
	ctx.fillRect(320,20,100,100);
	
	//draw a big rectangle as background
	ctx.fillStyle = "transparent";
	ctx.fillRect(0,0,800,800);

	//draw a circle - need (x,y), radius, start, end points
	ctx.fillStyle = "pink";
	ctx.strokeStyle = "blue";
	ctx.lineWidth= 2;
	//first, define the shape
	ctx.beginPath();
	ctx.arc(400,400,75,0,-Math.PI,0);
	//fill the shape
	ctx.fill();
	ctx.stroke();

	//oval
	ctx.fillStyle = "yellow";
	ctx.strokeStyle = "red";
	ctx.beginPath();
	ctx.ellipse(
		400,600,//x, y of the center
		250,85, //x radius, y radius
		Math.PI/3, // ???
		0, 2*Math.PI //start, stop
	);
	ctx.fill();
	ctx.stroke();
	
	//triangle
	ctx.fillStyle = "purple";
	ctx.strokeStyle = "pink";
	ctx.beginPath();
	ctx.moveTo(700,10);	
	ctx.lineTo(790,100);
	ctx.lineTo(610,100);
	ctx.lineTo(700,11);
	ctx.fill();
	ctx.stroke();
	</script>
</body>	
</html>
