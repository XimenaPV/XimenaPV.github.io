<!DOCTYPE html>
<html lang="en">
<head>
	<title>Animation</title>
</head>
<body>	
	<canvas id="myCanvas"
		width=800
		height=800></canvas>
<script>
	const canvas = document
	.getElementById("myCanvas");
	const ctx = canvas.getContext("2d");
	let speed = 5;
	let speed2 = 8;
	let x = 1;
	let x2 = 1;
	let time = 0;
	function animate(){
	time = time + 1;

	if(time<160){
		//move red
		x = x +speed;
	}

	if(time>160){
		//move pink
		x2 = x2 + speed2;
	}

	if(x>800){
	x = 0;
	x2 = 0;
	}
	//clear
	ctx.clearRect(0,0,800,800);
	//draw
	ctx.fillStyle = "purple";
	ctx.fillRect(x,100,10,10);
	ctx.fillStyle = "pink";
	ctx.fillRect(x2,300,10,10);
	//animate
	requestAnimationFrame(animate);
	}
	animate();
</script>
</body>
</html>
