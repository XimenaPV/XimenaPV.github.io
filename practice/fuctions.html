<!DOCTYPE html>
<head lang="en">
	<title>Functions</title>
</head>
<body>
	<h1>Functions</h1>
<script>
	//log is a function
	console.log("test"); //call (or execute) it

	//we can make our own functions!
	function sayHi(){	
		console.log("hi");
	}	
	sayHi(); //<- now we are executing it
	
</script>
</body>
</html>
